<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .score-board {
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        #gameCanvas {
            border: 4px solid #00ff88;
            border-radius: 10px;
            background: #0a0a15;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        
        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        
        .controls span {
            color: #00ff88;
        }
        
        #startBtn, #restartBtn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        #startBtn:hover, #restartBtn:hover {
            background: #00cc6a;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        #restartBtn {
            display: none;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4757;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="score-board">
            <span id="score">得分: 0</span> | 
            <span id="highScore">最高分: 0</span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <button id="startBtn">开始游戏</button>
        <button id="restartBtn">重新开始</button>
        <div class="controls">
            <p>方向键或 <span>W A S D</span> 控制移动</p>
            <p>按 <span>P</span> 暂停游戏</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = 100;
        let gameLoop;
        let isGameRunning = false;
        let isPaused = false;

        highScoreEl.textContent = `最高分: ${highScore}`;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            scoreEl.textContent = `得分: ${score}`;
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#1a1a2e';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food with glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff4757';
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    gridSize/2
                );
                
                if (index === 0) {
                    // Head
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00ff88';
                } else {
                    // Body
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 180, 100, ${alpha})`);
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
                ctx.shadowBlur = 0;

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    // Determine eye positions based on direction
                    let eye1X, eye1Y, eye2X, eye2Y;
                    if (direction.x === 1) { // Right
                        eye1X = segment.x * gridSize + gridSize - eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    } else if (direction.x === -1) { // Left
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    } else if (direction.y === -1) { // Up
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + eyeOffset;
                    } else { // Down
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + gridSize - eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw pause overlay
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸ 已暂停 - 按 P 继续', canvas.width/2, canvas.height/2);
            }
        }

        function update() {
            if (!isGameRunning || isPaused) return;

            direction = nextDirection;
            
            // Calculate new head position
            const head = { 
                x: snake[0].x + direction.x, 
                y: snake[0].y + direction.y 
            };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = `得分: ${score}`;
                
                // Speed up every 50 points
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            update();
            draw();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = `最高分: ${highScore}`;
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4757';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('💀 游戏结束', canvas.width/2, canvas.height/2 - 20);
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText(`最终得分: ${score}`, canvas.width/2, canvas.height/2 + 20);
            
            restartBtn.style.display = 'inline-block';
        }

        function startGame() {
            startBtn.style.display = 'none';
            initGame();
            isGameRunning = true;
            isPaused = false;
            draw();
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function restartGame() {
            restartBtn.style.display = 'none';
            startBtn.style.display = 'none';
            initGame();
            isGameRunning = true;
            isPaused = false;
            draw();
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning && (e.key === 'Enter' || e.key === ' ')) {
                if (restartBtn.style.display === 'none') {
                    startGame();
                } else {
                    restartGame();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
                case 'p':
                case 'P':
                    if (isGameRunning) {
                        isPaused = !isPaused;
                        draw();
                    }
                    break;
            }
        });

        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
