<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>墙后追杀 · 三国军战</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
  html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:monospace;touch-action:none;overscroll-behavior:none}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0)}
  #stage{position:relative;width:100%;max-width:800px;aspect-ratio:800/500;background:#1a1a1a;border:2px solid #333}
  canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  #touch{position:absolute;inset:auto 0 0 0;display:none;gap:4px;padding:6px 4px calc(6px + env(safe-area-inset-bottom,0)) 4px;background:rgba(0,0,0,.55);flex-wrap:wrap}
  .btn{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px;font:bold 11px monospace;flex:1;touch-action:none;-webkit-user-select:none;user-select:none}
  .btn:active,.btn.pressed{background:rgba(255,255,255,.32)}
  .btn.s1{border-color:#ffd54f;color:#ffd54f}
  .btn.s2{border-color:#7fdfff;color:#7fdfff}
  .btn.s3{border-color:#ff9b6b;color:#ff9b6b}
  .btn.s4{border-color:#ff5b5b;color:#ff5b5b}
  .btn.s5{border-color:#a8ff5b;color:#a8ff5b}
  .btn.s6{border-color:#7fff7f;color:#7fff7f}
  .btn.s7{border-color:#ff7fbf;color:#ff7fbf}
  .btn.s8{border-color:#b78aff;color:#b78aff}
  .btn.s9{border-color:#5fbfff;color:#5fbfff}
  .btn.s10{border-color:#ffaa3f;color:#ffaa3f}
  #dpad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:4px;flex:0 0 auto;width:140px;max-width:42vw;aspect-ratio:1}
  #dpad .btn{padding:0;font-size:18px}
  #dpad .b-up{grid-area:1/2/2/3}
  #dpad .b-left{grid-area:2/1/3/2}
  #dpad .b-right{grid-area:2/3/3/4}
  #dpad .b-down{grid-area:3/2/4/3}
  #skills{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
  .skill-row{display:flex;gap:3px;flex:1;min-width:0}
  .skill-row .btn{position:relative;font-size:11px;padding:3px 2px;min-width:0;white-space:nowrap}
  .cdmask{position:absolute;inset:0;background:rgba(0,0,0,.6);border-radius:4px;pointer-events:none;display:none}
  .cdmask.on{display:block}
  body.touch #touch{display:flex}
  body.touch #hint{display:none}
  #hint{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);color:#bbb;font:11px monospace;padding:6px 8px;border-radius:4px;pointer-events:none;line-height:1.5}
  #hint b{color:#ffd54f}
  @media (max-width: 420px) {
    .skill-row .btn{font-size:9px;padding:2px 1px}
    #dpad{width:110px}
  }
  @media (max-height: 600px) {
    #touch{padding:3px 4px calc(3px + env(safe-area-inset-bottom,0)) 4px;gap:2px}
    .skill-row .btn{font-size:9px}
  }
  /* 主将选择界面 */
  #pick{position:absolute;inset:0;display:none;background:rgba(0,0,0,.78);align-items:center;justify-content:center;z-index:10;flex-direction:column;gap:18px}
  #pick.on{display:flex}
  #pick h2{color:#ffd54f;font:bold 24px monospace;text-shadow:0 0 6px #000;letter-spacing:2px}
  #pick .sub{color:#bbb;font:12px monospace;margin-top:-8px}
  .cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:0 10px}
  .card{width:180px;background:rgba(20,30,20,.95);border:2px solid #555;border-radius:8px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .15s,border-color .15s}
  .card:active{transform:scale(.96)}
  .card .avatar{width:80px;height:80px;background:#2a3a2a;display:block;image-rendering:pixelated;border:1px solid #444}
  .card .nm{color:#ffd54f;font:bold 18px monospace}
  .card .wp{color:#7fdfff;font:11px monospace}
  .card .ds{color:#ccc;font:11px monospace;line-height:1.4;text-align:center;min-height:32px}
  .card .stats{color:#a8ff5b;font:bold 10px monospace;line-height:1.5;text-align:center}
  .card.go{color:#fff;background:rgba(255,213,79,.85);border-color:#ffd54f;font:bold 14px monospace;padding:6px 14px;border-radius:6px;margin-top:2px}
  .card.guanyu:hover,.card.guanyu:active{border-color:#3a8a3a;background:rgba(58,138,58,.15)}
  .card.zhangfei:hover,.card.zhangfei:active{border-color:#8a3a3a;background:rgba(138,58,58,.15)}
  .card.zhaoyun:hover,.card.zhaoyun:active{border-color:#3a6a8a;background:rgba(58,106,138,.15)}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="800" height="500"></canvas>
    <div id="hint">
      <b>WASD/方向键</b> 移动 · <b>R</b> 重新开始<br>
      <b>1</b>镖 <b>2</b>震 <b>3</b>掌 <b>4</b>弹<br>
      <b>5</b>技能 <b>6</b>血 <b>7</b>瞬
    </div>
    <div id="pick">
      <h2>⚔ 选择你的主将</h2>
      <div class="sub">每过一关双方血量翻倍,共 5 关</div>
      <div class="cards">
        <div class="card guanyu" data-hero="guanyu">
          <canvas class="avatar" width="80" height="80"></canvas>
          <div class="nm">关 羽</div>
          <div class="wp">青龙偃月刀</div>
          <div class="ds">血厚防高<br>青龙斩横扫一片</div>
          <div class="stats">HP 300 · 速 90 · 攻 20</div>
          <div class="card go">▶ 出 战</div>
        </div>
        <div class="card zhangfei" data-hero="zhangfei">
          <canvas class="avatar" width="80" height="80"></canvas>
          <div class="nm">张 飞</div>
          <div class="wp">丈八蛇矛</div>
          <div class="ds">攻击爆表<br>蛇矛一击 80 伤</div>
          <div class="stats">HP 250 · 速 80 · 攻 30</div>
          <div class="card go">▶ 出 战</div>
        </div>
        <div class="card zhaoyun" data-hero="zhaoyun">
          <canvas class="avatar" width="80" height="80"></canvas>
          <div class="nm">赵 云</div>
          <div class="wp">龙胆长枪</div>
          <div class="ds">机动王者<br>龙胆连刺三连击</div>
          <div class="stats">HP 200 · 速 130 · 攻 18</div>
          <div class="card go">▶ 出 战</div>
        </div>
      </div>
    </div>
    <div id="touch">
      <div id="dpad">
        <button class="btn b-up" data-key="up">▲</button>
        <button class="btn b-left" data-key="left">◀</button>
        <button class="btn b-right" data-key="right">▶</button>
        <button class="btn b-down" data-key="down">▼</button>
      </div>
      <div id="skills">
        <div class="skill-row">
          <button class="btn s1" data-skill="dart">1镖<div class="cdmask"></div></button>
          <button class="btn s2" data-skill="quake">2震<div class="cdmask"></div></button>
          <button class="btn s3" data-skill="palm">3掌<div class="cdmask"></div></button>
          <button class="btn s4" data-skill="missile">4弹<div class="cdmask"></div></button>
        </div>
        <div class="skill-row">
          <button class="btn s5" data-skill="heroSkill">5技能<div class="cdmask"></div></button>
          <button class="btn s6" data-skill="heal">6血<div class="cdmask"></div></button>
          <button class="btn s7" data-skill="blink">7瞬<div class="cdmask"></div></button>
        </div>
        <div class="skill-row">
          <button class="btn s8" data-key="revive" style="border-color:#888;color:#bbb">复活</button>
          <button class="btn s9" data-key="mute" style="border-color:#888;color:#bbb">🔊音</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(() => {
  'use strict';
  const cvs = document.getElementById('game');
  const ctx = cvs.getContext('2d');
  const W = 800, H = 500;

  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  cvs.width = W * dpr; cvs.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;

  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.body.classList.add('touch');
  }

  const IS_WECHAT = /MicroMessenger/i.test(navigator.userAgent || '');
  const IS_IOS = /iPad|iPhone|iPod/i.test(navigator.userAgent || '') && !window.MSStream;

  const rand = (a, b) => a + Math.random() * (b - a);
  const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const dartHitsWall = (d) => {
    for (const w of walls) {
      if (w.type === 'circle') {
        const dx = d.x - w.cx, dy = d.y - w.cy;
        if (dx * dx + dy * dy < (w.r + 2) * (w.r + 2)) return true;
      } else {
        if (d.x >= w.x - 2 && d.x <= w.x + w.w + 2 && d.y >= w.y - 2 && d.y <= w.y + w.h + 2) return true;
      }
    }
    return false;
  };

  // ============ 主将模板 ============
  const HEROES = {
    guanyu: {
      name: '关羽', weapon: '青龙偃月刀', skillName: '青龙斩',
      hp: 300, speed: 90, atk: 20, skillCd: 6,
      cloth: '#3a8a3a', hair: '#0a0a0a', skin: '#e85a3a', beard: '#0a0a0a',
      desc: '血厚防高·青龙斩横扫一片',
    },
    zhangfei: {
      name: '张飞', weapon: '丈八蛇矛', skillName: '蛇矛突刺',
      hp: 250, speed: 80, atk: 30, skillCd: 8,
      cloth: '#8a3a3a', hair: '#1a0a00', skin: '#d4a070', beard: '#0a0a0a',
      desc: '攻击爆表·蛇矛一击 80 伤',
    },
    zhaoyun: {
      name: '赵云', weapon: '龙胆长枪', skillName: '龙胆连刺',
      hp: 200, speed: 130, atk: 18, skillCd: 5,
      cloth: '#3a6a8a', hair: '#1a1a3a', skin: '#f4c990', beard: '',
      desc: '机动王者·龙胆连刺三连击',
    },
  };

  // ============ 兵种模板 ============
  const SOLDIERS = {
    infantry: {
      name: '步兵', hp: 100, speed: 60, atk: 8, range: 22,
      cloth: '#6a8a3a', hair: '#1a1a1a', skin: '#e8b888',
      clothDark: '#3a5a1a', mountColor: '',
      isMounted: false, isRanged: false,
    },
    cavalry: {
      name: '骑兵', hp: 200, speed: 110, atk: 12, chargeDmg: 24, range: 26,
      cloth: '#8a5a2b', hair: '#1a0a00', skin: '#d4a070',
      clothDark: '#5a3a1a', mountColor: '#8b5a2b',
      isMounted: true, isRanged: false,
    },
    archer: {
      name: '弓箭手', hp: 50, speed: 40, atk: 6, range: 180,
      cloth: '#a86a3a', hair: '#2a1a0a', skin: '#f4c990',
      clothDark: '#6a3a1a', mountColor: '',
      isMounted: false, isRanged: true, keepDist: [110, 150],
    },
  };

  // ============ 关卡配置 ============
  const LEVELS = {
    1: { playerHp: 250, enemyHeroHp: 500, map: 'plain',
         enemyArmy: ['infantry','infantry','archer'],
         label: '第一关·平原初阵', bg: 'plain' },
    2: { playerHp: 500, enemyHeroHp: 1000, map: 'forest',
         enemyArmy: ['cavalry','infantry','infantry','archer','archer'],
         label: '第二关·林地遭遇', bg: 'forest' },
    3: { playerHp: 1000, enemyHeroHp: 2000, map: 'river',
         enemyArmy: ['cavalry','cavalry','infantry','infantry','infantry','archer','archer'],
         label: '第三关·河流阻击', bg: 'river' },
    4: { playerHp: 2000, enemyHeroHp: 4000, map: 'canyon',
         enemyArmy: ['cavalry','cavalry','infantry','infantry','infantry','infantry','archer','archer','archer'],
         label: '第四关·峡谷激战', bg: 'canyon' },
    5: { playerHp: 4000, enemyHeroHp: 8000, map: 'fortress',
         enemyArmy: ['cavalry','cavalry','cavalry','infantry','infantry','infantry','infantry','infantry','archer','archer','archer','archer'],
         label: '第五关·城寨决战', bg: 'fortress' },
  };

  // ============ 地图配置 ============
  const MAPS = {
    plain: [
      { type:'rect', x:100, y: 60, w:22, h:110 },
      { type:'rect', x:100, y:330, w:22, h:110 },
      { type:'rect', x:240, y:170, w:22, h:160 },
      { type:'rect', x:380, y: 60, w:22, h:100 },
      { type:'rect', x:380, y:330, w:22, h:110 },
      { type:'rect', x:520, y:180, w:22, h:160 },
      { type:'rect', x:660, y: 60, w:22, h:120 },
      { type:'rect', x:660, y:320, w:22, h:120 },
    ],
    forest: [
      { type:'rect', x:120, y: 80, w:22, h: 90 },
      { type:'rect', x:280, y:330, w:22, h: 90 },
      { type:'rect', x:450, y: 80, w:22, h: 90 },
      { type:'rect', x:600, y:330, w:22, h: 90 },
      { type:'rect', x:380, y:230, w:80, h: 22 },
      { type:'rect', x:200, y:230, w:80, h: 22 },
      { type:'circle', cx:350, cy:120, r:28 },
      { type:'circle', cx:550, cy:400, r:32 },
      { type:'circle', cx:200, cy:400, r:26 },
      { type:'circle', cx:680, cy:200, r:30 },
    ],
    river: [
      // 中央横向河流（不可通过）
      { type:'rect', x:  0, y:220, w:380, h:60 },
      { type:'rect', x:420, y:220, w:380, h:60 },
      // 两岸掩体
      { type:'rect', x:120, y: 60, w:22, h:100 },
      { type:'rect', x:660, y:340, w:22, h:100 },
      { type:'rect', x:400, y: 60, w:22, h: 60 },
      { type:'rect', x:400, y:380, w:22, h: 60 },
    ],
    canyon: [
      // 左右石柱
      { type:'rect', x:200, y:  0, w:30, h:140 },
      { type:'rect', x:200, y:360, w:30, h:140 },
      { type:'rect', x:370, y:  0, w:30, h: 80 },
      { type:'rect', x:370, y:420, w:30, h: 80 },
      { type:'rect', x:540, y:  0, w:30, h:140 },
      { type:'rect', x:540, y:360, w:30, h:140 },
      { type:'rect', x:700, y:  0, w:30, h: 80 },
      { type:'rect', x:700, y:420, w:30, h: 80 },
    ],
    fortress: [
      { type:'rect', x: 80, y: 60, w:22, h: 80 },
      { type:'rect', x: 80, y:360, w:22, h: 80 },
      { type:'rect', x:200, y:200, w:22, h:100 },
      { type:'rect', x:320, y: 60, w:22, h:120 },
      { type:'rect', x:320, y:320, w:22, h:120 },
      { type:'rect', x:460, y:200, w:22, h:100 },
      { type:'rect', x:580, y: 60, w:22, h:120 },
      { type:'rect', x:580, y:320, w:22, h:120 },
      { type:'rect', x:700, y:200, w:22, h:100 },
      { type:'rect', x:400, y:240, w:80, h: 22 },
      { type:'circle', cx:140, cy:240, r:24 },
      { type:'circle', cx:660, cy:240, r:24 },
      { type:'circle', cx:400, cy: 80, r:22 },
      { type:'circle', cx:400, cy:420, r:22 },
    ],
  };

  const BG_COLORS = {
    plain:    { base:'#0e1a14', grid:'#122a1d', detail:'#1c4a30' },
    forest:   { base:'#0a1a10', grid:'#163a22', detail:'#2a5a32' },
    river:    { base:'#1a2030', grid:'#243240', detail:'#3a5a72' },
    canyon:   { base:'#1c1810', grid:'#3a3020', detail:'#5a4a30' },
    fortress: { base:'#15110a', grid:'#2a2418', detail:'#3a3020' },
  };

  const walls = []; // 当前关卡的墙

  // ============ 碰撞处理 ============
  const resolveWall = (ent) => {
    for (const w of walls) {
      if (ent.flying) continue;
      if (w.type === 'circle') {
        const dx = ent.x - w.cx, dy = ent.y - w.cy;
        const d = Math.hypot(dx, dy);
        const minD = w.r + ent.r;
        if (d < minD && d > 0) {
          const push = (minD - d) + 0.1;
          ent.x += (dx / d) * push;
          ent.y += (dy / d) * push;
        } else if (d === 0) {
          ent.x = w.cx + minD;
        }
      } else {
        const cx = clamp(ent.x, w.x, w.x + w.w);
        const cy = clamp(ent.y, w.y, w.y + w.h);
        const dx = ent.x - cx, dy = ent.y - cy;
        const d = Math.hypot(dx, dy);
        if (d < ent.r) {
          if (d === 0) { ent.x = w.x - ent.r; continue; }
          const push = (ent.r - d) + 0.1;
          ent.x += (dx / d) * push;
          ent.y += (dy / d) * push;
        }
      }
    }
    ent.x = clamp(ent.x, ent.r, W - ent.r);
    ent.y = clamp(ent.y, ent.r, H - ent.r);
  };

  // ============ 绘制:主将像素人物 ============
  function drawCharacter(c, opts) {
    const {
      x, y, facing, walkT, flying, moving,
      skin = '#f4c990', hair = '#2a1a0a', cloth, pants = '#3a3a3a', shoes = '#1a1a1a',
      beard = '', hat = null,
    } = opts;
    c.save();
    c.translate(x, y);
    c.scale(facing, 1);
    const swinging = moving && !flying;
    const legPhase = Math.sin(walkT) * 3;
    const armPhase = Math.sin(walkT) * 2.5;
    c.fillStyle = 'rgba(0,0,0,.4)';
    c.fillRect(-9, 14, 18, 2);
    if (flying) {
      c.fillStyle = 'rgba(255,213,79,.25)';
      c.beginPath(); c.arc(0, 0, 18, 0, Math.PI * 2); c.fill();
    }
    c.fillStyle = pants;
    if (flying) { c.fillRect(-4, 5, 3, 4); c.fillRect(1, 5, 3, 4); }
    else { c.fillRect(-5 - legPhase, 4, 3, 8); c.fillRect(2 + legPhase, 4, 3, 8); }
    c.fillStyle = shoes;
    if (flying) { c.fillRect(-4, 8, 3, 2); c.fillRect(1, 8, 3, 2); }
    else { c.fillRect(-6 - legPhase, 11, 4, 2); c.fillRect(1 + legPhase, 11, 4, 2); }
    c.fillStyle = cloth;
    if (flying) c.fillRect(-7, -1, 2, 5);
    else c.fillRect(-7, -1 + armPhase, 2, 6);
    c.fillStyle = cloth;
    c.fillRect(-5, -4, 10, 10);
    c.fillStyle = 'rgba(255,255,255,.18)';
    c.fillRect(-5, -4, 10, 2);
    c.fillStyle = '#000';
    c.fillRect(-5, -4, 10, 1);
    c.fillRect(-5, 5, 10, 1);
    c.fillRect(-5, -4, 1, 10);
    c.fillRect(4, -4, 1, 10);
    c.fillStyle = 'rgba(0,0,0,.25)';
    c.fillRect(-1, -3, 1, 8);
    c.fillStyle = cloth;
    if (flying) c.fillRect(5, -1, 2, 5);
    else c.fillRect(5, -1 - armPhase, 2, 6);
    c.fillStyle = skin;
    c.fillRect(-2, -6, 4, 2);
    c.fillRect(-4, -12, 8, 8);
    c.fillStyle = '#000';
    c.fillRect(-4, -12, 8, 1);
    c.fillRect(-4, -5, 8, 1);
    c.fillRect(-4, -12, 1, 8);
    c.fillRect(3, -12, 1, 8);
    c.fillStyle = hair;
    c.fillRect(-4, -12, 8, 2);
    c.fillRect(-4, -11, 1, 3);
    c.fillRect(3, -11, 1, 3);
    c.fillRect(-3, -10, 1, 1);
    c.fillRect(2, -10, 1, 1);
    c.fillStyle = '#fff';
    c.fillRect(0, -10, 2, 2);
    c.fillStyle = '#000';
    c.fillRect(1, -10, 1, 2);
    c.fillStyle = '#5a2a1a';
    c.fillRect(0, -7, 2, 1);
    if (flying) {
      c.strokeStyle = '#ffd54f';
      c.lineWidth = 1.5;
      c.beginPath(); c.ellipse(0, -14, 5, 2, 0, 0, Math.PI * 2); c.stroke();
    }
    if (beard) {
      c.fillStyle = beard;
      c.fillRect(-3, -5, 6, 5);
      c.fillRect(-2, 0, 1, 5);
      c.fillRect(1, 0, 1, 5);
      c.fillRect(-1, 0, 2, 6);
    }
    if (hat) {
      c.fillStyle = hat.top || '#8a6a3a';
      c.fillRect(-7, -16, 14, 2);
      c.fillRect(-9, -14, 18, 2);
      c.fillStyle = hat.shadow || '#5a3a1a';
      c.fillRect(-7, -16, 14, 1);
      c.fillRect(-9, -14, 18, 1);
      c.fillStyle = hat.rim || '#6a4a20';
      c.fillRect(-10, -13, 20, 1);
    }
    c.restore();
  }

    c.fillRect(-12, 4, 24, 1);
    c.fillRect(-16, -5, 6, 6);
    c.fillRect(-15, -7, 2, 2);

      c.fillRect(-3 + legB, 4, 2, 5);
      c.fillRect(4 + legB, 4, 2, 5);
      c.fillRect(9 + legA, 4, 2, 5);
      c.fillStyle = def.mountColor || '#8b5a2b';
      c.fillRect(-10, -2, 20, 7);
      c.fillStyle = '#5a3a1a';
      c.fillRect(-10, -2, 20, 1);
      c.fillRect(-10, 4, 20, 1);
      c.fillRect(-14, -4, 5, 5);
      c.fillRect(-13, -6, 2, 2);
      c.fillStyle = '#3a1a0a';
      c.fillRect(-9, -4, 3, 2);
      c.fillRect(10, -1, 3, 4);

      c.fillRect(1 + legB, 4, 2, 6);
      c.fillStyle = '#1a1a1a';
      c.fillRect(-3 - legA, 10, 3, 1);
      c.fillRect(1 + legB, 10, 3, 1);
    }
    // 身体
    c.fillStyle = def.cloth;
    if (def.isMounted) c.fillRect(-5, -5, 10, 8);
    else c.fillRect(-5, -5, 10, 8);
    c.fillStyle = '#000';
    c.fillRect(-5, -5, 10, 1);
    c.fillRect(-5, 2, 10, 1);
    c.fillRect(-5, -5, 1, 8);
    c.fillRect(4, -5, 1, 8);
    // 手臂
    c.fillStyle = def.cloth;
    c.fillRect(-6, -3 - armA, 2, 5);
    c.fillRect(4, -3 + armA, 2, 5);
    // 头
    c.fillStyle = def.skin;
    c.fillRect(-3, -10, 6, 6);
    c.fillStyle = '#000';
    c.fillRect(-3, -10, 6, 1);
    c.fillRect(-3, -5, 6, 1);
    c.fillRect(-3, -10, 1, 6);
    c.fillRect(2, -10, 1, 6);
    // 头发
    c.fillStyle = def.hair;
    c.fillRect(-3, -10, 6, 2);
    c.fillRect(-3, -9, 1, 2);
    c.fillRect(2, -9, 1, 2);
    // 眼
    c.fillStyle = '#fff';
    c.fillRect(-1, -8, 2, 2);
    c.fillStyle = '#000';
    c.fillRect(0, -8, 1, 2);
    // 弓箭手:挂弓
    if (def.isRanged) {
      c.fillStyle = '#5a3a1a';
      c.fillRect(-7, -10, 1, 8);

      c.fillStyle = '#aaa';
      c.fillRect(-9, -8, 4, 1);

      c.fillStyle = '#888';
      c.fillRect(6, -16, 1, 14);
      c.fillStyle = '#dde';
      c.fillRect(5, -16, 3, 2);

      c.fillStyle = '#888';
      c.fillRect(5, -7, 1, 6);

  // ============ 绘制:障碍物 ============
  function drawRectWall(c, w) {
    c.fillStyle = 'rgba(0,0,0,.5)';
    c.fillRect(w.x + 4, w.y + 4, w.w, w.h);
    c.fillStyle = '#7a5a3a';
    c.fillRect(w.x, w.y, w.w, w.h);
    c.fillStyle = '#3a2a1a';
    for (let by = w.y; by < w.y + w.h; by += 8) c.fillRect(w.x, by, w.w, 1);
    for (let bx = w.x; bx < w.x + w.w; bx += 8) c.fillRect(bx, w.y, 1, w.h);
    c.fillStyle = 'rgba(255,255,255,.08)';
    c.fillRect(w.x, w.y, w.w, 2);
  }

  function drawCircleWall(c, w, kind) {
    c.fillStyle = 'rgba(0,0,0,.4)';
    c.beginPath(); c.arc(w.cx + 3, w.cy + 3, w.r, 0, Math.PI * 2); c.fill();
    if (kind === 'tree') {
      // 树丛
      c.fillStyle = '#1a4a1a';
      c.beginPath(); c.arc(w.cx, w.cy, w.r, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#2a6a2a';
      c.beginPath(); c.arc(w.cx - w.r * 0.3, w.cy - w.r * 0.3, w.r * 0.7, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#3a8a3a';
      c.beginPath(); c.arc(w.cx - w.r * 0.4, w.cy - w.r * 0.4, w.r * 0.3, 0, Math.PI * 2); c.fill();
      // 像素叶子
      c.fillStyle = '#5aaa5a';
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + w.cy * 0.01;
        const rr = w.r * 0.6;
        const px = w.cx + Math.cos(a) * rr;
        const py = w.cy + Math.sin(a) * rr;
        c.fillRect(px - 1, py - 1, 2, 2);
      }
    } else {
      // 角楼(石塔)
      c.fillStyle = '#5a5a5a';
      c.beginPath(); c.arc(w.cx, w.cy, w.r, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#7a7a7a';
      c.beginPath(); c.arc(w.cx - 3, w.cy - 3, w.r - 4, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#000';
      c.beginPath(); c.arc(w.cx, w.cy, w.r, 0, Math.PI * 2); c.stroke();
    }
  }

  // ============ Entity 基类 ============
  class Entity {
    constructor(x, y, opts = {}) {
      this.x = x; this.y = y;
      this.r = opts.r || 10;
      this.vx = 0; this.vy = 0;
      this.hp = opts.hp || 100; this.maxHp = opts.hp || 100;
      this.speed = opts.speed || 100;
      this.atk = opts.atk || 10;
      this.facing = 1;
      this.flying = false;
      this.flyT = 0;
      this.knockT = 0; this.kx = 0; this.ky = 0;
      this.walkT = 0;
      this.shieldT = 0;
      this.slowT = 0;
      this.dead = false;
    }
    takeDamage(dmg, fromX, fromY, effect) {
      if (effect === 'ice') this.slowT = 1.5;
      if (this.shieldT > 0) dmg = Math.max(1, Math.ceil(dmg * 0.4));
      this.hp = Math.max(0, this.hp - dmg);
      this.knockT = 0.18;
      const a = Math.atan2(this.y - fromY, this.x - fromX);
      this.kx = Math.cos(a) * 220; this.ky = Math.sin(a) * 220;
      if (this.hp <= 0) this.dead = true;
      return this.dead;
    }
    update(dt) {
      if (this.flying) { this.flyT -= dt; if (this.flyT <= 0) this.flying = false; }
      if (this.shieldT > 0) this.shieldT -= dt;
      if (this.slowT > 0) this.slowT -= dt;
      const moving = Math.abs(this.vx) > 1 || Math.abs(this.vy) > 1;
      if (moving) this.walkT += dt * 10;
      if (this.knockT > 0) {
        this.knockT -= dt;
        this.x += this.kx * dt; this.y += this.ky * dt;
        this.kx *= 0.85; this.ky *= 0.85;
      } else {
        this.x += this.vx * dt; this.y += this.vy * dt;
      }
      resolveWall(this);
    }
  }

  // ============ 主将(玩家 + AI 敌人通用) ============
  class Hero extends Entity {
    constructor(x, y, heroType, isEnemy) {
      const def = HEROES[heroType];
      super(x, y, { hp: def.hp, speed: def.speed, atk: def.atk, r: 10 });
      this.heroType = heroType;
      this.def = def;
      this.isEnemy = !!isEnemy;
      this.cloth = def.cloth;
      this.hair = def.hair;
      this.skin = def.skin;
      this.beard = def.beard || '';
      this.skills = {
        dart:      { cd: 4, cdT: 0, cast: () => castDart(this) },
        quake:     { cd: 5, cdT: 0, cast: () => castQuake(this) },
        palm:      { cd: 6, cdT: 0, cast: () => castPalm(this) },
        missile:   { cd: 5, cdT: 0, cast: () => castMissile(this) },
        heroSkill: { cd: def.skillCd, cdT: 0, cast: () => castHeroSkill(this) },
        heal:      { cd: 8, cdT: 0, cast: () => castHeal(this) },
        blink:     { cd: 5, cdT: 0, cast: () => castBlink(this) },
      };
      this._triple = null; // 赵云连刺状态
      this._aiT = 0;
      this._aiCd = 0;
    }
    update(dt, input) {
      this.vx = 0; this.vy = 0;
      if (this.knockT > 0) { super.update(dt); return; }
      const sp = this.speed * (this.flying ? 1.5 : 1) * (this.slowT > 0 ? 0.5 : 1);
      if (this.isEnemy) {
        this._aiT -= dt;
        this._aiCd -= dt;
        this.updateAI(dt, sp);
      } else {
        if (input.up)    this.vy -= sp;
        if (input.down)  this.vy += sp;
        if (input.left)  { this.vx -= sp; this.facing = -1; }
        if (input.right) { this.vx += sp; this.facing = 1; }
      }
      super.update(dt);
      // 赵云连刺
      if (this._triple) {
        this._triple.t -= dt;
        if (this._triple.t <= 0) {
          const t = this._triple.target;
          if (t && !t.dead) {
            t.takeDamage(this._triple.dmg, this.x, this.y);
            flash(this.def.name + '·刺!', '#ffd54f');
            sfxDart();
          }
          this._triple.count++;
          if (this._triple.count >= 3) {
            this._triple = null;
          } else {
            this._triple.t = 0.1;
          }
        }
      }
      for (const k in this.skills) this.skills[k].cdT = Math.max(0, this.skills[k].cdT - dt);
    }
    updateAI(dt, sp) {
      // 找最近的目标:玩家主将 / 玩家兵
      const target = nearestEnemyFor(this);
      if (!target) return;
      const d = dist(this, target);
      const dx = target.x - this.x, dy = target.y - this.y;
      const len = Math.hypot(dx, dy) || 1;
      this.facing = dx > 0 ? 1 : -1;
      // 追击
      const closeD = (target.isHero ? 28 : 20);
      if (d > closeD) {
        this.vx = (dx / len) * sp;
        this.vy = (dy / len) * sp;
      }
      // 释放技能
      if (this._aiT <= 0) {
        const lowHP = this.hp < this.maxHp * 0.4;
        if (lowHP && this.skills.heal.cdT <= 0 && Math.random() < 0.4) {
          this.tryCast('heal'); this._aiT = 1.5;
        } else if (d < 280 && this.skills.palm.cdT <= 0 && Math.random() < 0.04) {
          this.tryCast('palm'); this._aiT = 1.5;
        } else if (d < 60 && this.skills.quake.cdT <= 0 && Math.random() < 0.15) {
          this.tryCast('quake'); this._aiT = 1.0;
        } else if (d > 130 && d < 220 && this.skills.missile.cdT <= 0 && Math.random() < 0.06) {
          this.tryCast('missile'); this._aiT = 1.0;
        } else if (d > 200 && this.skills.blink.cdT <= 0 && Math.random() < 0.04) {
          this.tryCast('blink'); this._aiT = 1.0;
        } else if (this.skills.heroSkill.cdT <= 0 && Math.random() < 0.025) {
          this.tryCast('heroSkill'); this._aiT = 1.5;
        } else if (d > 90 && d < 160 && this.skills.dart.cdT <= 0 && Math.random() < 0.08) {
          this.tryCast('dart'); this._aiT = 0.6;
        }
      }
    }
    tryCast(name) {
      const s = this.skills[name];
      if (!s || s.cdT > 0 || this.knockT > 0) return false;
      if (name === 'missile') {
        const tgt = nearestEnemyFor(this);
        if (!tgt || dist(this, tgt) > 500) return false;
      }
      s.cast();
      s.cdT = s.cd;
      return true;
    }
    draw(c) {
      const moving = Math.abs(this.vx) > 1 || Math.abs(this.vy) > 1;
      const yOff = this.isEnemy ? 0 : -2;
      if (this.heroType === 'guanyu' && !this.isEnemy) {
        // 玩家关羽骑普通马
        drawHorse(c, this.x, this.y + 14, this.facing, this.walkT);
        drawCharacter(c, {
          x: this.x, y: this.y - 2, facing: this.facing,
          walkT: this.walkT, flying: this.flying, moving,
          cloth: this.cloth, hair: this.hair,
          skin: this.skin, beard: this.beard,
        });
      } else {
        // 其余主将直接绘制像素人物
        drawCharacter(c, {
          x: this.x, y: this.y + yOff, facing: this.facing,
          walkT: this.walkT, flying: this.flying, moving,
          cloth: this.cloth, hair: this.hair,
          skin: this.skin, beard: this.beard,
        });
      }
      if (this.flying) {
        c.fillStyle = 'rgba(255,213,79,.25)';
        c.beginPath(); c.arc(this.x, this.y - 2, 18, 0, Math.PI * 2); c.fill();
      }
    }
  }

  // ============ 兵种 ============
  class Soldier extends Entity {
    constructor(x, y, soldierType, team) {
      const def = SOLDIERS[soldierType];
      super(x, y, { hp: def.hp, speed: def.speed, atk: def.atk, r: 8 });
      this.soldierType = soldierType;
      this.def = def;
      this.team = team; // 'player' | 'enemy'
      this.atkT = 0;
      this.reviveT = 0;  // 玩家兵死亡后复活倒计时
      this.followT = 0;  // 玩家兵跟随玩家的偏移
    }
    update(dt) {
      if (this.knockT > 0) { super.update(dt); return; }
      // 找目标
      const target = nearestEnemyFor(this);
      if (!target) { this.vx = 0; this.vy = 0; super.update(dt); return; }
      const d = dist(this, target);
      const dx = target.x - this.x, dy = target.y - this.y;
      const len = Math.hypot(dx, dy) || 1;
      this.facing = dx > 0 ? 1 : -1;
      this.atkT -= dt;

      if (this.def.isRanged) {
        // 弓箭手:保持距离,远攻
        const [dMin, dMax] = this.def.keepDist;
        if (d < dMin) {
          // 后退
          this.vx = -(dx / len) * this.speed;
          this.vy = -(dy / len) * this.speed;
        } else if (d > dMax) {
          this.vx = (dx / len) * this.speed;
          this.vy = (dy / len) * this.speed;
        } else {
          this.vx = 0; this.vy = 0;
        }
        // 射击
        if (this.atkT <= 0 && d <= this.def.range) {
          enemyArrows.push({
            x: this.x + this.facing * 6, y: this.y - 4,
            vx: (dx / len) * 320, vy: (dy / len) * 320,
            life: 1.5, dmg: this.def.atk, owner: this,
            isEnemy: this.team === 'enemy',
          });
          this.atkT = 0.9;
        }
      } else if (this.def.isMounted) {
        // 骑兵:高速追击,撞击 2 倍伤害
        if (d > this.def.range) {
          this.vx = (dx / len) * this.speed;
          this.vy = (dy / len) * this.speed;
        } else {
          this.vx = 0; this.vy = 0;
        }
        // 攻击
        if (this.atkT <= 0 && d < this.def.range) {
          const speed = Math.hypot(this.vx, this.vy);
          const dmg = speed > 60 ? this.def.chargeDmg : this.def.atk;
          if (target.takeDamage(dmg, this.x, this.y)) {
            if (this.team === 'enemy' && target === game.player) gameOver();
            else if (this.team === 'player' && target === game.enemy) gameWon();
          }
          this.atkT = 0.7;
          if (dmg === this.def.chargeDmg) flash('骑兵撞击!', this.team === 'enemy' ? '#ff5b5b' : '#a8ff5b');
        }
      } else {
        // 步兵:普通追击
        if (d > this.def.range) {
          this.vx = (dx / len) * this.speed;
          this.vy = (dy / len) * this.speed;
        } else {
          this.vx = 0; this.vy = 0;
        }
        if (this.atkT <= 0 && d < this.def.range) {
          if (target.takeDamage(this.def.atk, this.x, this.y)) {
            if (this.team === 'enemy' && target === game.player) gameOver();
            else if (this.team === 'player' && target === game.enemy) gameWon();
          }
          this.atkT = 0.6;
        }
      }
      super.update(dt);
    }
    draw(c) {
      drawSoldierSprite(c, this);
      // 血条
      if (this.hp < this.maxHp) {
        const w = 20;
        c.fillStyle = '#000'; c.fillRect(this.x - w/2 - 1, this.y - 22, w + 2, 4);
        c.fillStyle = '#400'; c.fillRect(this.x - w/2, this.y - 21, w, 2);
        c.fillStyle = this.team === 'enemy' ? '#e74c3c' : '#7fff7f';
        c.fillRect(this.x - w/2, this.y - 21, w * (this.hp / this.maxHp), 2);
      }
    }
  }

  // ============ 技能效果存储 ============
  const darts = [];
  const pulses = [];
  const missiles = [];
  const enemyArrows = [];
  const supplies = [];

  // ============ 辅助:找最近敌人 ============
  function nearestEnemyFor(unit) {
    // unit 是玩家/敌人主将或兵,返回其 team 阵营的敌方单位
    const team = unit.team || (unit.isEnemy ? 'enemy' : 'player');
    const wantEnemy = team === 'enemy';
    let best = null, bestD = Infinity;
    // 主将:玩家和敌方主将互为目标
    if (game.player && !game.player.dead && !wantEnemy) {
      const d = dist(unit, game.player);
      if (d < bestD) { bestD = d; best = game.player; }
    }
    if (game.enemy && !game.enemy.dead && wantEnemy) {
      const d = dist(unit, game.enemy);
      if (d < bestD) { bestD = d; best = game.enemy; }
    }
    // 兵种
    for (const s of soldiers) {
      if (s.dead) continue;
      if ((s.team === 'enemy') !== wantEnemy) continue;
      const d = dist(unit, s);
      if (d < bestD) { bestD = d; best = s; }
    }
    return best;
  }

  function allEnemiesOf(unit) {
    const team = unit.team || (unit.isEnemy ? 'enemy' : 'player');
    const wantEnemy = team !== 'enemy';
    const list = [];
    if (wantEnemy) {
      if (game.enemy && !game.enemy.dead) list.push(game.enemy);
      for (const s of soldiers) if (!s.dead && s.team === 'enemy') list.push(s);
    } else {
      if (game.player && !game.player.dead) list.push(game.player);
      for (const s of soldiers) if (!s.dead && s.team === 'player') list.push(s);
    }
    return list;
  }

  // ============ 通用技能 ============
  function castDart(p) {
    const isIce = Math.random() < 0.3;
    let vx, vy;
    if (!p.isEnemy) {
      vx = p.facing * 380; vy = 0;
    } else {
      const tgt = nearestEnemyFor(p);
      if (!tgt) return;
      const dx = tgt.x - p.x, dy = tgt.y - p.y;
      const len = Math.hypot(dx, dy) || 1;
      vx = (dx / len) * 360; vy = (dy / len) * 360;
      p.facing = dx > 0 ? 1 : -1;
    }
    darts.push({
      x: p.x + p.facing * 12, y: p.y - 2,
      vx, vy, life: 0.9, dmg: 10,
      type: isIce ? 'ice' : 'fire',
      owner: p, isEnemy: p.isEnemy,
    });
    sfxDart();
  }
  function castQuake(p) {
    const boost = (!p.isEnemy) ? (game.player.attackBoost || 0) : 0;
    pulses.push({ x: p.x, y: p.y, r: 0, maxR: 90, life: 0.4, dmg: 14 + boost, owner: p, color: '#ff9b6b', isEnemy: p.isEnemy });
    shakeT = Math.max(shakeT, 0.1);
    flash('震地!', '#ff9b6b');
  }
  function castPalm(p) {
    const tgt = nearestEnemyFor(p);
    if (!tgt) return;
    const tx = clamp(tgt.x, 80, W - 80);
    const ty = clamp(tgt.y, 80, H - 80);
    palmHandT = 0.7; palmHandX = tx; palmHandY = ty; shakeT = 0.3;
    pulses.push({ x: tx, y: ty, r: 0, maxR: 120, life: 0.6, dmg: 35, owner: p, color: '#ffd54f', isEnemy: p.isEnemy });
    flash(p.def.name + '·如来神掌!', '#ffd54f');
    sfxPalm();
  }
  function castMissile(p) {
    const tgt = nearestEnemyFor(p);
    if (!tgt) return;
    const dx = tgt.x - p.x, dy = tgt.y - p.y;
    const len = Math.hypot(dx, dy) || 1;
    const sp = 280;
    missiles.push({
      x: p.x, y: p.y,
      vx: (dx / len) * sp, vy: (dy / len) * sp,
      life: 4.0, maxLife: 4.0,
      dmg: 16, target: tgt, isEnemy: p.isEnemy, owner: p,
    });
    flash('🔥 火火箭!', '#ff8c3f');
  }
  function castHeal(p) {
    const before = p.hp;
    p.hp = Math.min(p.maxHp, p.hp + 30);
    const healed = p.hp - before;
    if (healed > 0) {
      flash(p.def.name + '·回血 +' + healed, p.isEnemy ? '#ff5b5b' : '#ff7fbf');
      sfxHeal();
    }
  }
  function castBlink(p) {
    const dx = p.facing;
    let nx = p.x + dx * 200;
    for (const w of walls) {
      let hit = false;
      if (w.type === 'circle') {
        const ddx = nx - w.cx, ddy = p.y - w.cy;
        if (ddx * ddx + ddy * ddy < (w.r + p.r) * (w.r + p.r)) hit = true;
      } else {
        if (nx > w.x - p.r && nx < w.x + w.w + p.r && p.y > w.y - p.r && p.y < w.y + w.h + p.r) hit = true;
      }
      if (hit) { nx = p.x + dx * 80; break; }
    }
    p.x = clamp(nx, 20, W - 20);
    p.y = clamp(p.y, 20, H - 20);
    flash('瞬移!', '#b78aff');
  }
  function castShield(p) {
    p.shieldT = 3;
    flash('护盾!', '#5fbfff');
  }

  // ============ 主将专属技能 ============
  function castHeroSkill(p) {
    if (p.heroType === 'guanyu') {
      // 青龙斩:范围 100 横扫,所有敌方 30 伤害
      const range = 100;
      const targets = allEnemiesOf(p);
      let hit = 0;
      for (const u of targets) {
        if (u.dead) continue;
        if (dist(p, u) <= range) {
          if (u.takeDamage(30, p.x, p.y)) {
            if (u === game.player) gameOver();
          }
          hit++;
        }
      }
      // 视觉脉冲
      pulses.push({ x: p.x, y: p.y, r: 0, maxR: range, life: 0.4, dmg: 0, color: '#a8ff5b', isEnemy: p.isEnemy, visualOnly: true });
      shakeT = Math.max(shakeT, 0.2);
      flash('青龙斩! ×' + hit, '#a8ff5b');
      sfxPalm();
    } else if (p.heroType === 'zhangfei') {
      // 蛇矛突刺:沿 facing 方向 350 像素的射线,线上所有敌方 80 伤害
      const len = 350;
      const dx = Math.cos(p.facing === 1 ? 0 : Math.PI);
      const dy = 0;
      const targets = allEnemiesOf(p);
      let hit = 0;
      for (const u of targets) {
        if (u.dead) continue;
        // 点到射线距离
        const ux = u.x - p.x, uy = u.y - p.y;
        const t = ux * dx + uy * dy;
        if (t < 0 || t > len) continue;
        const projx = p.x + dx * t, projy = p.y + dy * t;
        const dd = Math.hypot(u.x - projx, u.y - projy);
        if (dd < 22) {
          if (u.takeDamage(80, p.x, p.y)) {
            if (u === game.player) gameOver();
          }
          hit++;
        }
      }
      // 视觉:一道横线
      pulses.push({ x: p.x + dx * len / 2, y: p.y, r: 0, maxR: len / 2, life: 0.3, dmg: 0, color: '#ff5b5b', isEnemy: p.isEnemy, visualLine: true });
      shakeT = Math.max(shakeT, 0.25);
      flash('蛇矛突刺! ×' + hit, '#ff5b5b');
      sfxPalm();
    } else if (p.heroType === 'zhaoyun') {
      // 龙胆连刺:0.3s 内对最近敌人 3 次 15 伤害
      const tgt = nearestEnemyFor(p);
      if (!tgt) {
        flash('附近没敌人!', '#aaa');
        return;
      }
      p._triple = { count: 0, t: 0, dmg: 15, interval: 0.1, target: tgt };
      flash('龙胆连刺!', '#7fdfff');
      sfxDart();
    }
  }

  // ============ 提示文字 ============
  let flashText = '', flashColor = '#ffd54f', flashT = 0;
  function flash(t, color) { flashText = t; flashColor = color || '#ffd54f'; flashT = 1.2; }

  // ============ 音效 ============
  let audioCtx = null;
  let audioMuted = false;
  function ensureAudio() {
    if (audioMuted) return null;
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep(freq, dur, type, vol) {
    if (audioMuted) return;
    const ctx = ensureAudio();
    if (!ctx) return;
    type = type || 'square'; vol = vol == null ? 0.15 : vol;
    try {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function sfxHit()  { beep(180, 0.12, 'square', 0.18); }
  function sfxDart() { beep(880, 0.08, 'square', 0.10); }
  function sfxPalm() { beep(120, 0.35, 'sawtooth', 0.18); }
  function sfxHeal() { beep(660, 0.15, 'sine', 0.12); }
  function sfxWin()  { beep(523, 0.15, 'sine', 0.15); setTimeout(() => beep(784, 0.3, 'sine', 0.15), 150); }
  function toggleMute() {
    audioMuted = !audioMuted;
    const btn = document.querySelector('[data-key="mute"]');
    if (btn) btn.textContent = audioMuted ? '🔇静' : '🔊音';
    if (!audioMuted) ensureAudio();
  }

  // ============ 游戏主对象 ============
  const soldiers = [];
  const game = {
    player: null, enemy: null,
    over: false, won: false, overT: 0,
    level: 1, levelIntroT: 0,
    playerPickedHero: null, // 玩家选定的主将类型
    transitionT: 0,        // 关卡过渡倒计时
  };
  let palmHandT = 0, palmHandX = 0, palmHandY = 0;
  let shakeT = 0;

  // ============ 主将选择界面 ============
  function drawHeroAvatar(canvasEl, heroType) {
    const cc = canvasEl.getContext('2d');
    cc.imageSmoothingEnabled = false;
    cc.clearRect(0, 0, 80, 80);
    cc.save();
    cc.translate(40, 48);
    cc.scale(1.8, 1.8);
    const def = HEROES[heroType];
    const flashColor = heroType === 'guanyu' ? '#3a8a3a' : (heroType === 'zhangfei' ? '#8a3a3a' : '#3a6a8a');
    // 背景光环
    cc.fillStyle = flashColor + '55';
    cc.beginPath(); cc.arc(0, 0, 16, 0, Math.PI * 2); cc.fill();
    // 身体
    cc.fillStyle = def.cloth;
    cc.fillRect(-5, -4, 10, 10);
    cc.fillStyle = '#000';
    cc.fillRect(-5, -4, 10, 1);
    cc.fillRect(-5, 5, 10, 1);
    cc.fillRect(-5, -4, 1, 10);
    cc.fillRect(4, -4, 1, 10);
    // 头
    cc.fillStyle = def.skin;
    cc.fillRect(-4, -12, 8, 8);
    cc.fillStyle = '#000';
    cc.fillRect(-4, -12, 8, 1);
    cc.fillRect(-4, -5, 8, 1);
    cc.fillRect(-4, -12, 1, 8);
    cc.fillRect(3, -12, 1, 8);
    // 头发
    cc.fillStyle = def.hair;
    cc.fillRect(-4, -12, 8, 2);
    // 胡须
    if (def.beard) {
      cc.fillStyle = def.beard;
      cc.fillRect(-3, -5, 6, 4);
      cc.fillRect(-1, -1, 2, 4);
    }
    // 武器(根据主将)
    if (heroType === 'guanyu') {
      cc.fillStyle = '#5a3a1a';
      cc.fillRect(7, -10, 1, 14);
      cc.fillStyle = '#dde';
      cc.beginPath(); cc.arc(7, -12, 4, Math.PI * 0.5, Math.PI * 1.5); cc.fill();
    } else if (heroType === 'zhangfei') {
      cc.fillStyle = '#888';
      cc.fillRect(7, -14, 1, 16);
      cc.fillStyle = '#dde';
      cc.fillRect(6, -16, 3, 3);
    } else {
      cc.fillStyle = '#888';
      cc.fillRect(7, -16, 1, 20);
      cc.fillStyle = '#dde';
      cc.fillRect(6, -18, 3, 3);
    }
    cc.restore();
  }

  function pickHero(heroType) {
    game.playerPickedHero = heroType;
    document.getElementById('pick').classList.remove('on');
    reset();
  }

  // 绑定选将卡片(只用 click,避免 touchstart + click 重复触发)
  let _picking = false;
  document.querySelectorAll('#pick .card[data-hero]').forEach(card => {
    const ht = card.dataset.hero;
    drawHeroAvatar(card.querySelector('.avatar'), ht);
    card.addEventListener('click', () => {
      if (_picking) return;
      _picking = true;
      pickHero(ht);
      setTimeout(() => _picking = false, 500);
    });
  });

  // ============ 关卡初始化 ============
  function pickEnemyHeroType() {
    const types = Object.keys(HEROES);
    const candidates = types.filter(t => t !== game.playerPickedHero);
    return candidates[Math.floor(Math.random() * candidates.length)];
  }

  function spawnPosForEnemy(i, total) {
    // 敌方单位分布在右侧(玩家在 60,250)
    if (total === 1) return { x: 700, y: H / 2 };
    const cols = Math.min(total, 4);
    const row = Math.floor(i / cols);
    const col = i % cols;
    return { x: 580 + col * 60, y: 100 + row * 90 };
  }

  function reset() {
    if (!game.playerPickedHero) {
      // 还没选主将,显示选择界面
      document.getElementById('pick').classList.add('on');
      return;
    }
    // 1. 加载地图
    walls.length = 0;
    const mapKey = LEVELS[game.level].map;
    for (const w of MAPS[mapKey]) walls.push({ ...w });
    // 2. 创建/重置玩家主将
    if (!game.player || game.player.heroType !== game.playerPickedHero) {
      game.player = new Hero(60, H / 2, game.playerPickedHero, false);
    }
    game.player.hp = LEVELS[game.level].playerHp;
    game.player.maxHp = LEVELS[game.level].playerHp;
    game.player.x = 60; game.player.y = H / 2;
    game.player.facing = 1;
    game.player.shieldT = 0; game.player.slowT = 0;
    game.player.knockT = 0;
    // 3. 创建敌方主将
    const enemyType = pickEnemyHeroType();
    game.enemy = new Hero(740, H / 2, enemyType, true);
    game.enemy.hp = LEVELS[game.level].enemyHeroHp;
    game.enemy.maxHp = LEVELS[game.level].enemyHeroHp;
    game.enemy.facing = -1;
    // 4. 清空兵种
    soldiers.length = 0;
    // 5. 生成敌方兵
    const army = LEVELS[game.level].enemyArmy;
    army.forEach((st, i) => {
      const pos = spawnPosForEnemy(i, army.length);
      soldiers.push(new Soldier(pos.x, pos.y, st, 'enemy'));
    });
    // 6. 生成玩家兵(1 骑兵 + 1 弓箭手,跟随玩家)
    soldiers.push(new Soldier(110, H / 2 - 30, 'cavalry', 'player'));
    soldiers.push(new Soldier(110, H / 2 + 30, 'archer', 'player'));
    // 7. 清空特效
    darts.length = 0; pulses.length = 0; missiles.length = 0;
    enemyArrows.length = 0; supplies.length = 0;
    palmHandT = 0; shakeT = 0; flashT = 0;
    // 8. 关卡提示
    game.over = false; game.won = false; game.overT = 0;
    game.levelIntroT = 1.5;
    flash(`⚔ ${LEVELS[game.level].label}`, '#ffd54f');
  }

  reset(); // 第一次调用:显示选将界面

  // ============ 输入 ============
  const input = { up:false, down:false, left:false, right:false };
  const skillKeys = {
    '1':'dart', '2':'quake', '3':'palm', '4':'missile',
    '5':'heroSkill', '6':'heal', '7':'blink',
    'j':'dart', 'J':'dart',
    'k':'quake', 'K':'quake',
    'l':'palm', 'L':'palm',
    'm':'missile', 'M':'missile',
    'q':'heroSkill', 'Q':'heroSkill',
    'h':'heal', 'H':'heal',
    'b':'blink', 'B':'blink',
    'F1':'dart', 'F2':'quake', 'F3':'palm', 'F4':'missile',
    'F5':'heroSkill', 'F6':'heal', 'F7':'blink',
  };
  window.addEventListener('keydown', e => {
    ensureAudio();
    if (e.key === 'r' || e.key === 'R') {
      if (game.over) { game.level = 1; reset(); }
      return;
    }
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (game.over) { game.level = 1; reset(); }
      return;
    }
    if (skillKeys[e.key]) { game.player && game.player.tryCast(skillKeys[e.key]); return; }
    const dir = {
      'ArrowUp':'up','w':'up','W':'up',
      'ArrowDown':'down','s':'down','S':'down',
      'ArrowLeft':'left','a':'left','A':'left',
      'ArrowRight':'right','d':'right','D':'right',
    }[e.key];
    if (dir) { input[dir] = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', e => {
    const dir = {
      'ArrowUp':'up','w':'up','W':'up',
      'ArrowDown':'down','s':'down','S':'down',
      'ArrowLeft':'left','a':'left','A':'left',
      'ArrowRight':'right','d':'right','D':'right',
    }[e.key];
    if (dir) input[dir] = false;
  });

  function bindHold(sel, key) {
    const el = document.querySelector(sel); if (!el) return;
    const on  = e => { e.preventDefault(); e.stopPropagation(); ensureAudio(); input[key] = true;  el.classList.add('pressed'); };
    const off = e => { e.preventDefault(); e.stopPropagation(); input[key] = false; el.classList.remove('pressed'); };
    el.addEventListener('touchstart', on, {passive:false});
    el.addEventListener('touchend',   off, {passive:false});
    el.addEventListener('touchcancel',off, {passive:false});
    el.addEventListener('mousedown',  on);
    el.addEventListener('mouseup',    off);
    el.addEventListener('mouseleave', off);
  }
  bindHold('.b-up','up'); bindHold('.b-down','down');
  bindHold('.b-left','left'); bindHold('.b-right','right');
  document.querySelectorAll('[data-skill]').forEach(btn => {
    const sk = btn.dataset.skill;
    const fire = e => { e.preventDefault(); e.stopPropagation(); ensureAudio(); game.player && game.player.tryCast(sk); btn.classList.add('pressed'); setTimeout(() => btn.classList.remove('pressed'), 120); };
    btn.addEventListener('touchstart', fire, {passive:false});
    btn.addEventListener('mousedown',  fire);
  });
  const reviveBtn = document.querySelector('[data-key="revive"]');
  if (reviveBtn) {
    const fireRevive = e => { e.preventDefault(); e.stopPropagation(); ensureAudio(); if (game.over) { game.level = 1; game.playerPickedHero = null; reset(); } };
    reviveBtn.addEventListener('touchstart', fireRevive, {passive:false});
    reviveBtn.addEventListener('mousedown',  fireRevive);
  }
  const muteBtn = document.querySelector('[data-key="mute"]');
  if (muteBtn) {
    const fireMute = e => { e.preventDefault(); e.stopPropagation(); toggleMute(); };
    muteBtn.addEventListener('touchstart', fireMute, {passive:false});
    muteBtn.addEventListener('mousedown',  fireMute);
  }
  const releaseAll = e => {
    input.up = input.down = input.left = input.right = false;
    document.querySelectorAll('.b-up,.b-down,.b-left,.b-right').forEach(el => el.classList.remove('pressed'));
  };
  document.addEventListener('touchend', releaseAll, {passive:false});
  document.addEventListener('touchcancel', releaseAll, {passive:false});
  document.addEventListener('visibilitychange', releaseAll);
  document.addEventListener('blur', releaseAll);
  document.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
  document.addEventListener('gesturestart', e => e.preventDefault());

  // ============ 主循环 ============
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  function update(dt) {
    if (!game.over && game.player && game.playerPickedHero) {
      // 玩家兵复活机制
      for (let i = soldiers.length - 1; i >= 0; i--) {
        const s = soldiers[i];
        if (s.dead && s.team === 'player') {
          if (s.reviveT <= 0) {
            s.reviveT = 15;
          } else {
            s.reviveT -= dt;
            if (s.reviveT <= 0) {
              // 在玩家身边复活
              const ang = Math.random() * Math.PI * 2;
              s.x = game.player.x + Math.cos(ang) * 25;
              s.y = game.player.y + Math.sin(ang) * 25;
              s.hp = s.maxHp;
              s.dead = false;
              s.atkT = 0;
              flash(s.def.name + '·复活!', '#7fff7f');
            }
          }
        }
      }
      // 清理已死亡的兵(非玩家兵直接清除)
      for (let i = soldiers.length - 1; i >= 0; i--) {
        if (soldiers[i].dead && soldiers[i].team !== 'player') soldiers.splice(i, 1);
      }
      // 兵种更新
      for (const s of soldiers) {
        if (!s.dead) s.update(dt);
      }
      // 主将更新
      game.player.update(dt, input);
      game.enemy.update(dt, null);
      // 玩家与敌人主将贴近碰撞
      if (!game.player.dead && !game.enemy.dead &&
          Math.abs(game.player.x - game.enemy.x) < 18 && Math.abs(game.player.y - game.enemy.y) < 18) {
        if (game.player.flying || Math.random() < 0.3) {
          game.enemy.takeDamage(4, game.player.x, game.player.y);
          // 击中敌主将由 checkLevelComplete 判定
        } else {
          if (game.player.takeDamage(6, game.enemy.x, game.enemy.y)) gameOver();
        }
      }
      // 飞镖
      for (let i = darts.length - 1; i >= 0; i--) {
        const d = darts[i];
        d.x += d.vx * dt; d.y += (d.vy || 0) * dt; d.life -= dt;
        if (d.life <= 0 || d.x < -20 || d.x > W + 20 || d.y < -20 || d.y > H + 20) { darts.splice(i, 1); continue; }
        if (dartHitsWall(d)) { darts.splice(i, 1); continue; }
        // 命中兵种
        let hit = false;
        for (const s of soldiers) {
          if (s.dead) continue;
          const isEnemy = s.team === 'enemy';
          if (d.isEnemy !== isEnemy) continue;
          if (dist(d, s) < 12) {
            if (s.takeDamage(d.dmg, d.x, d.y, d.type)) {
              if (s.team === 'enemy') {
                // 敌方兵死亡不算赢,要全部清完才算赢
              }
            }
            darts.splice(i, 1);
            hit = true;
            break;
          }
        }
        if (hit) continue;
        // 命中主将
        const tgtHero = d.isEnemy ? game.player : game.enemy;
        if (tgtHero && !tgtHero.dead && dist(d, tgtHero) < 14) {
          if (tgtHero.takeDamage(d.dmg, d.x, d.y, d.type)) {
            if (tgtHero === game.player) gameOver();
            // 击中敌主将不立即 gameWon,由 checkLevelComplete 等所有敌兵清完再判定
          }
          darts.splice(i, 1);
        }
      }
      // 弓箭手箭矢
      for (let i = enemyArrows.length - 1; i >= 0; i--) {
        const a = enemyArrows[i];
        a.x += a.vx * dt; a.y += a.vy * dt; a.life -= dt;
        if (a.life <= 0 || a.x < -20 || a.x > W + 20 || a.y < -20 || a.y > H + 20) { enemyArrows.splice(i, 1); continue; }
        if (dartHitsWall(a)) { enemyArrows.splice(i, 1); continue; }
        let hit = false;
        // 命中兵
        for (const s of soldiers) {
          if (s.dead) continue;
          const isEnemy = s.team === 'enemy';
          if (a.isEnemy !== isEnemy) continue;
          if (dist(a, s) < 10) {
            s.takeDamage(a.dmg, a.x, a.y);
            enemyArrows.splice(i, 1); hit = true; break;
          }
        }
        if (hit) continue;
        // 命中主将
        const tgtHero = a.isEnemy ? game.player : game.enemy;
        if (tgtHero && !tgtHero.dead && dist(a, tgtHero) < 14) {
          if (tgtHero.takeDamage(a.dmg, a.x, a.y)) {
            if (tgtHero === game.player) gameOver();
            // 击中敌主将由 checkLevelComplete 判定
          }
          enemyArrows.splice(i, 1);
        }
      }
      // 脉冲(震地/如来神掌/技能视觉)
      for (let i = pulses.length - 1; i >= 0; i--) {
        const p = pulses[i];
        p.life -= dt; p.r = p.maxR * (1 - p.life / 0.6);
        if (p.life <= 0) {
          if (!p.visualOnly) {
            for (const s of soldiers) {
              if (s.dead) continue;
              const isEnemy = s.team === 'enemy';
              if (p.isEnemy !== isEnemy) continue;
              if (dist(p, s) < p.maxR) s.takeDamage(p.dmg, p.x, p.y);
            }
            const tgtHero = p.isEnemy ? game.player : game.enemy;
            if (tgtHero && !tgtHero.dead && dist(p, tgtHero) < p.maxR) {
              if (tgtHero.takeDamage(p.dmg, p.x, p.y)) {
                if (tgtHero === game.player) gameOver();
                else gameWon();
              }
            }
          }
          pulses.splice(i, 1);
        }
      }
      // 追踪导弹
      for (let i = missiles.length - 1; i >= 0; i--) {
        const m = missiles[i];
        m.life -= dt;
        if (m.life <= 0) { missiles.splice(i, 1); continue; }
        const cur = Math.atan2(m.vy, m.vx);
        const sp = Math.hypot(m.vx, m.vy) || 1;
        const ax = m.x + (m.vx / sp) * 22;
        const ay = m.y + (m.vy / sp) * 22;
        if (dartHitsWall({ x: ax, y: ay })) {
          let nearest = null, nd = Infinity;
          for (const w of walls) {
            let cwx, cwy, dd;
            if (w.type === 'circle') {
              cwx = w.cx; cwy = w.cy;
              dd = Math.hypot(m.x - cwx, m.y - cwy);
            } else {
              cwx = clamp(m.x, w.x, w.x + w.w);
              cwy = clamp(m.y, w.y, w.y + w.h);
              dd = Math.hypot(m.x - cwx, m.y - cwy);
            }
            if (dd < nd) { nd = dd; nearest = w; }
          }
          if (nearest) {
            const wcx = nearest.type === 'circle' ? nearest.cx : nearest.x + nearest.w / 2;
            const wcy = nearest.type === 'circle' ? nearest.cy : nearest.y + nearest.h / 2;
            const nx = m.x - wcx, ny = m.y - wcy;
            const nl = Math.hypot(nx, ny) || 1;
            const avoidAng = Math.atan2(ny / nl, nx / nl);
            let diff = avoidAng - cur;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            while (diff < -Math.PI) diff += 2 * Math.PI;
            const turn = clamp(diff, -8 * dt, 8 * dt);
            m.vx = Math.cos(cur + turn) * sp;
            m.vy = Math.sin(cur + turn) * sp;
          }
        } else if (m.target && !m.target.dead) {
          const dx = m.target.x - m.x, dy = m.target.y - m.y;
          const tgt = Math.atan2(dy, dx);
          let diff = tgt - cur;
          while (diff > Math.PI) diff -= 2 * Math.PI;
          while (diff < -Math.PI) diff += 2 * Math.PI;
          const turn = clamp(diff, -4 * dt, 4 * dt);
          m.vx = Math.cos(cur + turn) * sp;
          m.vy = Math.sin(cur + turn) * sp;
        }
        m.x += m.vx * dt; m.y += m.vy * dt;
        if (m.x < -30 || m.x > W + 30 || m.y < -30 || m.y > H + 30) { missiles.splice(i, 1); continue; }
        if (dartHitsWall(m)) { missiles.splice(i, 1); continue; }
        // 命中主将
        const tgtHero = m.isEnemy ? game.player : game.enemy;
        if (tgtHero && !tgtHero.dead && dist(m, tgtHero) < 14) {
          if (tgtHero.takeDamage(m.dmg, m.x, m.y)) {
            if (tgtHero === game.player) gameOver();
            // 击中敌主将由 checkLevelComplete 判定
          }
          missiles.splice(i, 1);
        }
      }
      // 兵种之间碰撞(士兵太近会互推)
      for (let i = 0; i < soldiers.length; i++) {
        const a = soldiers[i];
        if (a.dead) continue;
        for (let j = i + 1; j < soldiers.length; j++) {
          const b = soldiers[j];
          if (b.dead) continue;
          if (a.team === b.team) continue; // 同阵营不互推
          const dd = dist(a, b);
          if (dd < (a.r + b.r) && dd > 0) {
            const push = (a.r + b.r - dd) / 2 + 0.1;
            const dx = a.x - b.x, dy = a.y - b.y;
            a.x += (dx / dd) * push;
            a.y += (dy / dd) * push;
            b.x -= (dx / dd) * push;
            b.y -= (dy / dd) * push;
          }
        }
      }
      if (palmHandT > 0) palmHandT -= dt;
      if (shakeT > 0) shakeT -= dt;
      if (game.levelIntroT > 0) game.levelIntroT -= dt;
      // 检查胜利:敌主将死亡 且 所有敌兵死亡
      checkLevelComplete();
    } else {
      game.overT += dt;
    }
    if (flashT > 0) flashT -= dt;
    updateCDMask();
  }
  function gameOver() {
    game.over = true; game.won = false;
  }
  function checkLevelComplete() {
    if (!game.enemy || !game.enemy.dead) return;
    // 检查敌方兵是否全部死亡
    for (const s of soldiers) {
      if (s.team === 'enemy' && !s.dead) return;
    }
    gameWon();
  }
  function gameWon() {
    if (game.level < 5) {
      game.level++;
      reset();
    } else {
      game.over = true; game.won = true;
      sfxWin();
    }
  }

  function updateCDMask() {
    const map = {
      dart:'.s1', quake:'.s2', palm:'.s3', missile:'.s4',
      heroSkill:'.s5', heal:'.s6', blink:'.s7'
    };
    for (const k in map) {
      const m = document.querySelector(map[k] + ' .cdmask');
      if (!m) continue;
      const s = game.player && game.player.skills[k];
      if (s && s.cdT > 0) { m.classList.add('on'); m.style.opacity = (s.cdT / s.cd).toFixed(2); }
      else m.classList.remove('on');
    }
    // 更新主将技能按钮的标签(显示主将的技能名)
    const skillBtn = document.querySelector('.s5');
    if (skillBtn && game.player) {
      const def = HEROES[game.player.heroType];
      skillBtn.firstChild.nodeValue = `5${def.skillName.slice(0,2)}`;
    }
  }

  // ============ 绘制 ============
  function draw() {
    let sx = 0, sy = 0;
    if (shakeT > 0) { sx = rand(-8, 8); sy = rand(-6, 6); }
    ctx.save();
    ctx.translate(sx, sy);

    // 背景(按关卡切换)
    const bgKey = LEVELS[game.level] ? LEVELS[game.level].bg : 'plain';
    const bg = BG_COLORS[bgKey];
    ctx.fillStyle = bg.base;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = bg.grid;
    for (let y = 0; y < H; y += 32) for (let x = ((y/32)%2)*32; x < W; x += 64) ctx.fillRect(x, y, 32, 32);
    ctx.fillStyle = bg.detail;
    for (let i = 0; i < 40; i++) {
      const gx = (i * 137) % W, gy = (i * 91) % H;
      ctx.fillRect(gx, gy, 4, 2); ctx.fillRect(gx+2, gy-2, 2, 4);
    }
    // 河流特殊效果:蓝色河带
    if (bgKey === 'river') {
      ctx.fillStyle = 'rgba(60,130,200,.5)';
      ctx.fillRect(0, 220, W, 60);
      ctx.fillStyle = 'rgba(140,200,240,.6)';
      for (let x = 0; x < W; x += 30) {
        ctx.fillRect(x + (Math.floor(performance.now() / 200) % 30), 230, 20, 2);
        ctx.fillRect(x + 15 + (Math.floor(performance.now() / 200) % 30), 250, 15, 2);
        ctx.fillRect(x + 5 + (Math.floor(performance.now() / 200) % 30), 268, 18, 2);
      }
    }
    // 城寨特殊效果:地面砖纹
    if (bgKey === 'fortress') {
      ctx.fillStyle = 'rgba(120,100,80,.3)';
      for (let x = 0; x < W; x += 40) {
        ctx.fillRect(x, 0, 1, H);
      }
    }

    // 障碍物
    for (const w of walls) {
      if (w.type === 'circle') {
        const kind = bgKey === 'forest' ? 'tree' : 'tower';
        drawCircleWall(ctx, w, kind);
      } else {
        if (bgKey === 'river' && w.y >= 200 && w.y <= 280) {
          // 河流区矩形改成透明(其实河流整条是不可通过的,矩形隐藏)
          continue;
        }
        drawRectWall(ctx, w);
      }
    }

    // 敌方兵 + 玩家兵 + 敌方主将 + 玩家主将
    // 按 y 排序绘制(伪 3D 远近)
    const drawList = [];
    if (game.enemy && !game.enemy.dead) drawList.push({ y: game.enemy.y, draw: () => game.enemy.draw(ctx) });
    if (game.player && !game.player.dead) drawList.push({ y: game.player.y, draw: () => game.player.draw(ctx) });
    for (const s of soldiers) {
      if (s.dead) continue;
      drawList.push({ y: s.y, draw: () => s.draw(ctx) });
    }
    drawList.sort((a, b) => a.y - b.y);
    for (const d of drawList) d.draw();

    // 飞镖
    for (const d of darts) {
      const dx = Math.sign(d.vx), dy = Math.sign(d.vy || 0);
      const ico = d.type === 'ice' ? '#7fdfff' : '#ff8c3f';
      for (let t = 0; t < 3; t++) {
        const tx = d.x - dx * (t + 1) * 5;
        const ty = d.y - dy * (t + 1) * 5;
        const a = (0.55 - t * 0.18).toFixed(2);
        ctx.fillStyle = d.type === 'ice' ? `rgba(127,223,255,${a})` : `rgba(255,140,63,${a})`;
        ctx.fillRect(tx - 2, ty - 1, 4, 2);
      }
      ctx.fillStyle = ico;
      ctx.fillRect(Math.round(d.x) - 4, Math.round(d.y) - 1, 8, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.round(d.x) - 1, Math.round(d.y) - 1, 2, 2);
      if (d.type === 'ice') {
        ctx.fillStyle = '#fff';
        ctx.fillRect(Math.round(d.x) - 6, Math.round(d.y) - 2, 1, 1);
        ctx.fillRect(Math.round(d.x) + 5, Math.round(d.y) - 1, 1, 1);
      } else {
        ctx.fillStyle = '#ffe066';
        ctx.fillRect(Math.round(d.x) - 6, Math.round(d.y) - 1, 1, 1);
      }
    }
    // 弓箭手箭矢
    for (const a of enemyArrows) {
      const ang = Math.atan2(a.vy, a.vx);
      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(ang);
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(-5, 0, 10, 1);
      ctx.fillStyle = '#fff';
      ctx.fillRect(4, -1, 2, 3);
      ctx.restore();
    }
    // 导弹
    for (const m of missiles) {
      const ang = Math.atan2(m.vy, m.vx);
      for (let t = 0; t < 7; t++) {
        const tlen = (t + 1) * 4;
        const tx = m.x - Math.cos(ang) * tlen;
        const ty = m.y - Math.sin(ang) * tlen;
        const a = (0.7 - t * 0.09).toFixed(2);
        const hue = m.isEnemy ? `rgba(255,${90 - t * 10},60,${a})` : `rgba(255,${160 - t * 18},40,${a})`;
        ctx.fillStyle = hue;
        ctx.fillRect(tx - 2, ty - 1, 4, 2);
      }
      ctx.fillStyle = m.isEnemy ? '#ff3a3a' : '#ff6a1a';
      ctx.fillRect(m.x - 3, m.y - 2, 6, 4);
      ctx.fillStyle = '#fff';
      ctx.fillRect(m.x + 2, m.y - 1, 2, 2);
      ctx.fillStyle = m.isEnemy ? '#ffaa3f' : '#ffd54f';
      ctx.fillRect(m.x - 4, m.y - 1, 1, 2);
      ctx.fillRect(m.x + 3, m.y - 1, 1, 2);
    }
    // 脉冲
    for (const p of pulses) {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 3;
      ctx.globalAlpha = clamp(p.life / 0.6, 0, 1);
      if (p.visualLine) {
        // 张飞蛇矛线
        const cx = p.x, cy = p.y;
        ctx.beginPath();
        ctx.moveTo(cx - p.r, cy);
        ctx.lineTo(cx + p.r, cy);
        ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    if (palmHandT > 0) drawPalmHand(palmHandX, palmHandY, 1 - palmHandT / 0.7);
    // 关卡开场大字
    if (game.levelIntroT > 0) {
      const a = clamp(game.levelIntroT / 1.5, 0, 1);
      ctx.save();
      ctx.translate(W / 2, H / 2 - 80);
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffd54f';
      ctx.font = 'bold 32px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
      ctx.strokeText(`⚔ 第 ${game.level} 关`, 0, 0);
      ctx.fillText(`⚔ 第 ${game.level} 关`, 0, 0);
      ctx.font = 'bold 18px monospace';
      ctx.fillText(LEVELS[game.level].label, 0, 32);
      ctx.restore();
    }
    // 护盾圈
    if (game.player && game.player.shieldT > 0) {
      const a = clamp(game.player.shieldT / 3, 0, 1);
      ctx.strokeStyle = `rgba(95,191,255,${a})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(game.player.x, game.player.y, 18, 0, Math.PI * 2); ctx.stroke();
    }
    if (game.enemy && game.enemy.shieldT > 0) {
      const a = clamp(game.enemy.shieldT / 3, 0, 1);
      ctx.strokeStyle = `rgba(95,191,255,${a * 0.8})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(game.enemy.x, game.enemy.y, 18, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();

    drawHUD();
    if (game.over) drawOver();
  }

  function drawHUD() {
    const pad = 12;
    if (!game.player || !game.enemy) return;
    // 关卡名(顶部右侧)
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = '#ffd54f';
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.fillText(`⚔ 第 ${game.level} 关 · ${LEVELS[game.level].label}`, W - pad, pad - 2);
    // 敌方主将血条
    drawBar(W - pad - 220, pad, 220, 16, game.enemy.hp, game.enemy.maxHp, '#e74c3c',
            `敌方·${game.enemy.def.name}`);
    // 玩家主将信息
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    let extra = `主将:${game.player.def.name} `;
    if (game.player.flying) extra += '✈飞行 ';
    if (game.player.shieldT > 0) extra += `🛡${game.player.shieldT.toFixed(1)} `;
    // 统计兵种数量
    let pC = 0, pA = 0, pI = 0;
    for (const s of soldiers) {
      if (s.dead) continue;
      if (s.team !== 'player') continue;
      if (s.soldierType === 'cavalry') pC++;
      else if (s.soldierType === 'archer') pA++;
      else pI++;
    }
    extra += `🐎${pC} 🗡${pI} 🏹${pA}`;
    ctx.fillText(extra, pad, pad);
    // 玩家血条
    drawBar(pad, H - 20, W - pad * 2, 16, game.player.hp, game.player.maxHp, '#3fa9f5',
            `${game.player.def.name}·你`);
    // 技能键位
    const sk = game.player.skills;
    const labels = [
      ['1','镖',sk.dart,'#7fdfff'],['2','震',sk.quake,'#ff9b6b'],
      ['3','掌',sk.palm,'#ff5b5b'],['4','弹',sk.missile,'#ff8c3f'],
      ['5',game.player.def.skillName.slice(0,2),sk.heroSkill,'#a8ff5b'],
      ['6','血',sk.heal,'#ff7fbf'],
      ['7','瞬',sk.blink,'#b78aff'],
    ];
    const bw = 80, gap = 4;
    const totalW = bw * 7 + gap * 6;
    let x0 = (W - totalW) / 2, y0 = H - 56;
    labels.forEach(([key, name, s, color], i) => {
      const x = x0 + i * (bw + gap);
      ctx.fillStyle = '#000'; ctx.fillRect(x - 1, y0 - 1, bw + 2, 22);
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(x, y0, bw, 20);
      ctx.fillStyle = color; ctx.fillRect(x, y0, 18, 20);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(key, x + 9, y0 + 10);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px monospace';
      ctx.fillText(name, x + 32, y0 + 10);
      if (s.cdT > 0) {
        ctx.fillStyle = 'rgba(0,0,0,.75)';
        ctx.fillRect(x, y0, bw, 20);
        ctx.fillStyle = color;
        ctx.font = 'bold 10px monospace';
        ctx.fillText(s.cdT.toFixed(1) + 's', x + bw / 2, y0 + 10);
      }
    });
    if (flashT > 0) {
      const a = clamp(flashT / 1.2, 0, 1);
      const scale = 1 + (1 - a) * 0.2;
      ctx.save();
      ctx.translate(W / 2, H - 100);
      ctx.scale(scale, scale);
      ctx.globalAlpha = a;
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.strokeText(flashText, 0, 0);
      ctx.fillStyle = flashColor;
      ctx.fillText(flashText, 0, 0);
      ctx.restore();
    }
  }

  function drawBar(x, y, w, h, hp, max, color, label) {
    ctx.fillStyle = '#000'; ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    ctx.fillStyle = '#222'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color; ctx.fillRect(x, y, w * (hp / max), h);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(label + ' ' + Math.ceil(hp) + ' / ' + max, x + 6, y + h / 2);
  }

  function drawPalmHand(cx, cy, t) {
    const scale = 1.4 + t * 1.2;
    const alpha = 1 - t;
    ctx.save();
    ctx.translate(cx, cy - 20 + t * 40);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#f4c990';
    ctx.fillRect(-22, -8, 44, 28);
    for (let i = -2; i <= 2; i++) {
      const fx = i * 10;
      const fl = i === 0 ? 18 : (Math.abs(i) === 1 ? 22 : 16);
      ctx.fillRect(fx - 3, -8 - fl, 6, fl);
    }
    ctx.fillRect(-32, 4, 10, 14);
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-22, -8, 44, 28);
    ctx.fillStyle = 'rgba(90,58,26,.4)';
    ctx.fillRect(-14, 0, 28, 1);
    ctx.fillRect(-10, 6, 20, 1);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#ffd54f';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, 60 + t * 80, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  function drawOver() {
    ctx.fillStyle = 'rgba(0,0,0,.65)';
    ctx.fillRect(0, 0, W, H);
    if (game.won) {
      ctx.fillStyle = '#ffd54f';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🏆 通关!全部胜利!', W / 2, H / 2 - 20);
    } else {
      ctx.fillStyle = '#e74c3c';
      ctx.font = 'bold 48px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('你死了', W / 2, H / 2 - 20);
    }
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('按 R 或 空格 重新开始', W / 2, H / 2 + 30);
  }

  requestAnimationFrame(loop);
})();
</script>
